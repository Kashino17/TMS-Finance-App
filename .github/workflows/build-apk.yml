name: Build APK

on:
  push:
    branches: [main]
    paths: ['android/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tms-banking-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tms-banking-debug

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: TMS Banking APK (build ${{ steps.sha.outputs.short }})
          body: |
            Automatisch gebaute Debug-APK.

            **Installation:** APK herunterladen und auf dem Galaxy Fold 7 installieren.
            (Unter Einstellungen → Apps → Spezielle Berechtigungen → Unbekannte Apps installieren aktivieren)
          files: app-debug.apk
          draft: false
          prerelease: false
