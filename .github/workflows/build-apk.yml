name: Build APK

on:
  push:
    branches: [main]
    paths: ['android/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/TMS-Banking.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TMS-Banking
          path: android/app/build/outputs/apk/release/TMS-Banking.apk
          retention-days: 90

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ steps.sha.outputs.short }}
          name: TMS Banking v1.0 (${{ steps.sha.outputs.short }})
          body: |
            **TMS Banking** — Personal Finance Tracker

            Signierte Release-APK für Samsung Galaxy Fold 7.

            **Installation:**
            1. APK herunterladen
            2. Auf dem Handy öffnen
            3. Falls nötig: Einstellungen → Apps → Spezielle Berechtigungen → Unbekannte Apps installieren → Browser/Dateien erlauben
            4. Installieren
          files: android/app/build/outputs/apk/release/TMS-Banking.apk
          draft: false
          prerelease: false
